display_information:
  name: deferred-work-bot
  description: Tracks deferred work, votes, and files Jira tickets.
  background_color: "#2c2d30"
features:
  bot_user:
    display_name: deferred-work-bot
    always_online: true
  app_home:
    home_tab_enabled: false
    messages_tab_enabled: false
oauth_config:
  scopes:
    bot:
      - app_mentions:read
      - channels:history
      - channels:read
      - chat:write
      - groups:history
      - reactions:read
      - reactions:write
      - users:read
      - users:read.email
settings:
  event_subscriptions:
    bot_events:
      - app_mention
      - message.channels
      - message.groups
      - reaction_added
      - reaction_removed
  interactivity:
    is_enabled: true
  socket_mode_enabled: true
